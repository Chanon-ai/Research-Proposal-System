services:
  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: iam-backend
    env_file:
      - ./backend-node/.env
    environment:
      PORT: ${PORT:-8081}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "${PORT:-8081}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.PORT||8081;require('http').get('http://127.0.0.1:'+p+'/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./fontend-vue
      dockerfile: Dockerfile
      args:
        VUE_APP_API_BASE_URL: ${VUE_APP_API_BASE_URL:-/}
        VUE_APP_API_URL: ${VUE_APP_API_URL:-/}
        VUE_APP_CLIENTID: ${VUE_APP_CLIENTID:-}
        VUE_APP_SCOPE: ${VUE_APP_SCOPE:-profile email}
        VUE_APP_PROMPT: ${VUE_APP_PROMPT:-select_account}
    container_name: iam-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: iam-mongo
    restart: unless-stopped
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: iam-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
  redis_data:
